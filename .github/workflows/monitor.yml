name: Paradigm Tracker — Daily Monitor

on:
  schedule:
    # 매일 오전 8시 KST (전일 23:00 UTC)
    - cron: "0 23 * * *"
    # 매일 오후 6시 KST (09:00 UTC) — 미국 장 마감 후
    - cron: "0 9 * * *"
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data/signals.json 커밋용

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests

      - name: 모니터링 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FINNHUB_KEY:        ${{ secrets.FINNHUB_KEY }}
          EARNINGSFEED_KEY:   ${{ secrets.EARNINGSFEED_KEY }}
        run: python monitor.py

      - name: 결과 커밋 (signals.json 업데이트)
        run: |
          git config user.name  "Paradigm Bot"
          git config user.email "bot@paradigm-tracker"
          git add data/signals.json data/signals_prev.json || true
          git diff --staged --quiet || git commit -m "chore: signals update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
